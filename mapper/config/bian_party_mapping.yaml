# BIAN Party 领域映射配置
# 参考: https://bian.org/servicelandscape-12-0-0/views/view_53836.html
# 将遗留模型表/字段映射到 BIAN Party Helper Diagram 定义的业务实体

version: "1.0"
domain: "Party"

# 表级映射：遗留表 -> BIAN 业务实体
table_mapping:
  party:
    bian_entity: "Party"
    description: "主体核心信息，对应 BIAN Party 实体"
    subtype: null  # Person | Organisation，由 party_type 字段决定
  party_role:
    bian_entity: "Party Role"
    description: "主体角色，对应 BIAN Party Role"
    parent_entity: "Party"
  party_contact:
    bian_entity: "Location Involvement"
    subtype: "Contact Point Address"
    description: "联系点地址，对应 BIAN Location (Contact Point Address)"
    parent_entity: "Party"
  party_address:
    bian_entity: "Location Involvement"
    description: "地址位置，对应 BIAN Location Involvement"
    parent_entity: "Party"
  party_relationship:
    bian_entity: "Party_Party Relationship"
    description: "主体间关系，对应 BIAN Party_Party Relationship"
    parent_entity: "Party"

# 字段级映射：遗留字段 -> BIAN 属性
# 格式: 表名.字段名 -> BIAN 实体.属性
column_mapping:
  # === Party 核心字段 ===
  party.party_id:
    bian_attribute: "Party Reference"
    bian_entity: "Party"
    data_type: "Identifier"
    cardinality: "1"
    rule_ref: "primary_identifier"
  party.party_type:
    bian_attribute: "Party Type"
    bian_entity: "Party"
    bian_enum: "PartyTypeValues"
    value_mapping_ref: "party_type"
    rule_ref: "determine_subtype"
  party.legal_name:
    bian_attribute: "Party Name"
    bian_entity: "Party"
    data_type: "Name"
    cardinality: "1..*"
  party.birth_date:
    bian_attribute: "Party Date Time"
    bian_entity: "Party"
    sub_attribute: "Place of Birth Date"
    data_type: "DateTime"
    rule_ref: "date_field_always_map"
  party.registration_date:
    bian_attribute: "Party Date Time"
    bian_entity: "Party"
    sub_attribute: "Registration Date"
    data_type: "DateTime"
    rule_ref: "date_field_always_map"
  party.gender:
    bian_attribute: "Person Attributes"
    bian_entity: "Person"
    data_type: "String"
    rule_ref: "date_field_always_map"  # 暂时允许映射，之后可以根据party_type细化
  party.national_id_type:
    bian_attribute: "Party Identification Type"
    bian_entity: "Party Identification"
    bian_enum: "PartyIdentificationTypeValues"
    value_mapping_ref: "national_id_type"
  party.national_id_number:
    bian_attribute: "Party Identification"
    bian_entity: "Party Identification"
    data_type: "Identifier"
    sub_attribute: "Identifier Value"
  party.tax_id:
    bian_attribute: "Party Identification"
    bian_entity: "Party Identification"
    party_identification_type: "TaxIdentificationNumber"
    data_type: "Identifier"
    sub_attribute: "Identifier Value"
  party.country_of_residence:
    bian_attribute: "Location Reference"
    bian_entity: "Location Involvement"
    party_location_type: "Location is Domicile Address of Party"
    rule_ref: "address_related"
  party.nationality:
    bian_attribute: "Location Reference"
    bian_entity: "Location Involvement"
    party_location_type: "Location is Place of Birth of Party"
    rule_ref: "person_only"
  party.risk_rating:
    bian_attribute: "Risk Level"
    bian_entity: "Party Profile"
    party_profile_type: "Risk Profile"
    data_type: "String"
  party.source_of_funds:
    bian_attribute: "Source Of Wealth"
    bian_entity: "Party Profile"
    party_profile_type: "KYC Profile"
    data_type: "String"
  party.compliance_status:
