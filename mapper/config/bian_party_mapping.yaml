    bian_entity: "Party Profile"
    party_profile_type: "KYC Profile"
    data_type: "String"
  party.external_reference:
    bian_attribute: "Party Reference"
    bian_entity: "Party"
    data_type: "Identifier"
    description: "外部系统引用"

  # === 扩展映射：根据 BIAN Party Helper Diagram 精细映射 ===
